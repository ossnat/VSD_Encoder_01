# RidgeCV encoder defaults (stage 03).

# L2 regularization strengths scanned by RidgeCV on train split.
alphas: [0.01, 0.1, 1.0, 10.0, 100.0, 1000.0, 10000.0, 100000.0, 1000000.0]

cv_folds: 5
standardize_features: true
plot_one_per_condition: true
plot_prefer_split: test
rows_per_grid_page: 12
recon_grid_ncol: 4

# Masked evaluation (stage 03 trial-wise r, stage 04 pixel metrics).
# Center and geometry match VSD foundation model crop_loss circle.
evaluation:
  use_mask: true
  mask_type: circle
  mask_radius: 50
